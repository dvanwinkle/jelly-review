name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}
    defaults:
      run:
        working-directory: Jellyfin.Plugin.JellyReview

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci
        working-directory: .

      - name: Run JS tests
        run: npm test
        working-directory: .

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Publish
        run: dotnet publish --no-restore --configuration Release --output ../publish

      - name: Generate plugin metadata
        working-directory: .
        env:
          PLUGIN_GUID: a8b1c2d3-e4f5-6789-abcd-ef0123456789
          PLUGIN_NAME: JellyReview
          PLUGIN_CATEGORY: General
          PLUGIN_OWNER: ${{ github.repository_owner }}
          PLUGIN_DESCRIPTION: Review workflow plugin for Jellyfin.
          PLUGIN_OVERVIEW: Review and moderate media in Jellyfin
          TARGET_ABI: 10.10.0.0
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ "${VERSION}" = "${GITHUB_REF_NAME}" ]; then
            VERSION="0.0.0.0"
          fi
          TIMESTAMP="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          cat > publish/meta.json <<EOF
          {
            "category": "${PLUGIN_CATEGORY}",
            "changelog": "Build ${GITHUB_SHA}",
            "description": "${PLUGIN_DESCRIPTION}",
            "guid": "${PLUGIN_GUID}",
            "name": "${PLUGIN_NAME}",
            "overview": "${PLUGIN_OVERVIEW}",
            "owner": "${PLUGIN_OWNER}",
            "targetAbi": "${TARGET_ABI}",
            "timestamp": "${TIMESTAMP}",
            "version": "${VERSION}"
          }
          EOF

      - name: Package plugin zip
        run: |
          mkdir -p ../dist
          cd ../publish
          zip -r ../dist/Jellyfin.Plugin.JellyReview.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: Jellyfin.Plugin.JellyReview
          path: dist/Jellyfin.Plugin.JellyReview.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Jellyfin.Plugin.JellyReview.zip

      - name: Generate plugin manifest
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
          PLUGIN_GUID: a8b1c2d3-e4f5-6789-abcd-ef0123456789
          PLUGIN_NAME: JellyReview
          PLUGIN_CATEGORY: General
          PLUGIN_OWNER: ${{ github.repository_owner }}
          PLUGIN_DESCRIPTION: Review workflow plugin for Jellyfin.
          PLUGIN_OVERVIEW: Review and moderate media in Jellyfin
          TARGET_ABI: 10.10.0.0
        run: |
          mkdir -p pages
          VERSIONS_JSON="[]"
          for TAG in $(gh release list --json tagName --jq '.[].tagName' | sort -Vr); do
            VERSION="${TAG#v}"
            ZIP_NAME="Jellyfin.Plugin.JellyReview.zip"
            SOURCE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${ZIP_NAME}"
            TIMESTAMP=$(gh release view "${TAG}" --json publishedAt --jq '.publishedAt' | sed 's/T/ /;s/Z//')
            TMPZIP=$(mktemp)
            if curl -sL -o "${TMPZIP}" "${SOURCE_URL}" && [ -s "${TMPZIP}" ]; then
              CHECKSUM=$(md5sum "${TMPZIP}" | awk '{print $1}')
            else
              CHECKSUM=""
            fi
            rm -f "${TMPZIP}"
            CHANGELOG=$(sed -n "/^## \[${VERSION}\]/,/^## \[/{/^## \[${VERSION}\]/d;/^## \[/d;p;}" CHANGELOG.md | sed '/^$/d' | head -50)
            if [ -z "${CHANGELOG}" ]; then
              CHANGELOG="Release ${TAG}"
            fi
            VERSIONS_JSON=$(echo "${VERSIONS_JSON}" | jq \
              --arg cs "${CHECKSUM}" \
              --arg cl "${CHANGELOG}" \
              --arg abi "${TARGET_ABI}" \
              --arg url "${SOURCE_URL}" \
              --arg ts "${TIMESTAMP}" \
              --arg ver "${VERSION}" \
              '. + [{"checksum":$cs,"changelog":$cl,"targetAbi":$abi,"sourceUrl":$url,"timestamp":$ts,"version":$ver}]')
          done
          jq -n \
            --arg cat "${PLUGIN_CATEGORY}" \
            --arg guid "${PLUGIN_GUID}" \
            --arg name "${PLUGIN_NAME}" \
            --arg desc "${PLUGIN_DESCRIPTION}" \
            --arg owner "${PLUGIN_OWNER}" \
            --arg overview "${PLUGIN_OVERVIEW}" \
            --argjson versions "${VERSIONS_JSON}" \
            '[{"category":$cat,"guid":$guid,"name":$name,"description":$desc,"owner":$owner,"overview":$overview,"versions":$versions}]' \
            > pages/manifest.json

      - name: Configure GitHub Pages
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-pages-artifact@v4
        with:
          path: pages

      - name: Deploy to GitHub Pages
        if: startsWith(github.ref, 'refs/tags/v')
        id: deploy-pages
        uses: actions/deploy-pages@v4
