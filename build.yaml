overview: "Parental media review workflow for Jellyfin"
description: >
  JellyReview holds newly added movies and series for parent approval before
  child users can access them, using Jellyfin's built-in tag-based parental
  controls, automatic review rules, notifications, and audit history.
category: "Administration"
artifacts:
  - "Jellyfin.Plugin.JellyReview.dll"
changelog: |-
  - Add per-profile review decisions, tag enforcement, dashboard filtering, and many-to-many rule assignments.
  - Add an approved-item allow tag and configure viewer profiles with Jellyfin's allowed-tags parental control.
  - Add missing Jellyfin plugin template scaffolding, Renovate configuration, VS Code workspace tasks, and CI workflow files.
  - Remove the reusable Jellyfin changelog workflow in favor of the existing explicit changelog and tag release flow.
  - Disable the Jellyfin upstream publish workflow until deploy secrets are configured.
  - Store JellyReview parental-control tags as separate Jellyfin preference values instead of a pipe-delimited tag.
  - Correct review action toast text so deny actions display "Denied successfully" instead of "Denyd successfully".
